<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Survey Access</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
  background: #f5f5f5;
}

.container {
  background: white;
  width: 90%;
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
}

button {
  background: #1a73e8;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>الوصول إلى الملف</h2>

<p id="text">يرجى تعبئة الاستبيان للحصول على الملف</p>

<button id="btn" onclick="openForm()">ابدأ الاستبيان</button>

</div>


<script>

const formLink = "https://docs.google.com/forms/d/e/1FAIpQLSfMnfkxshEeDFS-l3kaJzx_HcrVk5DQwqmDuzPT5hpHTapNnA/viewform?usp=sharing&ouid=113482101584299063567";

const fileLink = "https://www.memr.gov.jo/En/NewsDetails/The_Ministry_of_Energy_and_mineral_resources__launches_a_platform_for_investment_opportunities_in_mineral_resources_oil_gas_and_oil_shale";

const daysLimit = 7;


// إذا رجع المستخدم بعد إرسال الفورم
const urlParams = new URLSearchParams(window.location.search);

if (urlParams.get("done") === "true") {

  localStorage.setItem("survey_completed", new Date());

  window.location.href = fileLink;

}


// فحص إذا سبق تعبئة خلال 7 أيام

let completed = localStorage.getItem("survey_completed");

if(completed){

  let lastDate = new Date(completed);
  let now = new Date();

  let diff = (now - lastDate) / (1000*60*60*24);

  if(diff < daysLimit){

    window.location.href = fileLink;

  }

}


function openForm(){

  window.location.href = formLink;

}

</script>

</body>
</html>
