<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Survey Access</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
  background: #f5f5f5;
}

.container {
  background: white;
  width: 90%;
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
}

button {
  background: #1a73e8;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>

</head>

<body>

<div class="container">

<h2>الوصول إلى الملف</h2>

<p>يرجى تعبئة الاستبيان للحصول على الملف</p>

<button onclick="openForm()">ابدأ الاستبيان</button>

</div>


<script>

const formLink = "https://docs.google.com/forms/d/e/1FAIpQLSfMnfkxshEeDFS-l3kaJzx_HcrVk5DQwqmDuzPT5hpHTapNnA/viewform?usp=sharing&ouid=113482101584299063567";

const fileLink = "https://www.facebook.com";

const daysLimit = 7;


function checkUser(){

  let completed = localStorage.getItem("survey_completed");

  if(completed){

    let lastDate = new Date(completed);
    let today = new Date();

    let diff = (today - lastDate) / (1000*60*60*24);

    if(diff < daysLimit){
      window.location.href = fileLink;
    }
  }

}


function openForm(){

  localStorage.setItem("survey_completed", new Date());

  window.location.href = formLink;

}


checkUser();

</script>

</body>
</html>
