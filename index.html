<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>File Access</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
  background: #f5f5f5;
}

.container {
  background: white;
  width: 90%;
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
}

button {
  background: #1a73e8;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>الوصول إلى الملف</h2>

<p>يرجى تعبئة الاستبيان للحصول على الملف</p>

<button onclick="openForm()">ابدأ الاستبيان</button>

</div>


<script>

const formLink = "ضع رابط الفورم هنا";

const fileAPI = "https://script.google.com/macros/s/AKfycbwSDrvxaVfmSRf3-dmvTekjjvghJmzIpQ4ZYEQhayhVxTmi7Bi3y3nqIzgiXEjiyVvp/exec";

let fileLink = "";

const daysLimit = 7;


// جلب رابط الملف من Google Sheet

fetch(fileAPI)
.then(response => response.json())
.then(data => {
  fileLink = data.fileLink;
});


// إذا عاد المستخدم بعد إرسال الفورم

const urlParams = new URLSearchParams(window.location.search);

if (urlParams.get("done") === "true") {

  localStorage.setItem("survey_completed", new Date());

  setTimeout(() => {
    window.location.href = fileLink;
  }, 500);

}


// فحص مدة 7 أيام

let completed = localStorage.getItem("survey_completed");

if (completed && fileLink) {

  let lastDate = new Date(completed);
  let now = new Date();

  let diff = (now - lastDate) / (1000 * 60 * 60 * 24);

  if(diff < daysLimit){

    window.location.href = fileLink;

  }

}


// فتح الاستبيان

function openForm(){

  window.location.href = formLink;

}

</script>

</body>
</html>
