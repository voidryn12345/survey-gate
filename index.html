<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>File Access</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
  background: #f5f5f5;
}

.container {
  background: white;
  width: 90%;
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
}

button {
  background: #1a73e8;
  color: white;
  border: none;
  padding: 15px 35px;
  font-size: 18px;
  border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

<h2>الوصول إلى الملف</h2>

<p>يرجى تعبئة الاستبيان للحصول على الملف</p>

<button onclick="openForm()">ابدأ الاستبيان</button>

</div>


<script>

const formLink = "https://docs.google.com/forms/d/e/1FAIpQLSfMnfkxshEeDFS-l3kaJzx_HcrVk5DQwqmDuzPT5hpHTapNnA/viewform?usp=sharing&ouid=113482101584299063567";

const fileAPI = "https://script.google.com/macros/s/AKfycbwSDrvxaVfmSRf3-dmvTekjjvghJmzIpQ4ZYEQhayhVxTmi7Bi3y3nqIzgiXEjiyVvp/exec";

const daysLimit = 7;


async function startSystem(){

  let response = await fetch(fileAPI);
  let data = await response.json();

  let fileLink = data.fileLink;


  // إذا رجع بعد تعبئة الفورم
  const params = new URLSearchParams(window.location.search);

  if(params.get("done") === "true"){

    localStorage.setItem("survey_completed", new Date());

    window.location.href = fileLink;
    return;

  }


  // فحص آخر تعبئة

  let completed = localStorage.getItem("survey_completed");

  if(completed){

    let last = new Date(completed);
    let now = new Date();

    let diff = (now-last)/(1000*60*60*24);

    if(diff < daysLimit){

      window.location.href = fileLink;
      return;

    }

  }

}


function openForm(){

  window.location.href = formLink;

}


startSystem();

</script>

</body>
</html>
